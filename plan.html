<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Shelter Planner</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body { font-family: Arial; margin: 20px; }
  #map { height: 500px; margin-top: 10px; }
  #suggestions { border: 1px solid #ccc; max-height: 150px; overflow-y: auto; padding: 0; }
  #suggestions li { list-style: none; padding: 6px; cursor: pointer; }
  #suggestions li:hover { background: #eee; }
</style>
</head>

<body>

<h1>Emergency Shelter Planner</h1>

<input id="cityInput" placeholder="Type a city..." autocomplete="off"/>
<ul id="suggestions"></ul>

<select id="disasterSelect">
  <option value="">Select Disaster</option>
  <option value="Earthquake">Earthquake</option>
  <option value="Flood">Flood</option>
  <option value="Fire">Fire</option>
</select>

<div id="map"></div>

<div id="cityInfo"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/planner.js"></script>

</body>
</html>
