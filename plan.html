<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emergency Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body class="bg-gray-50 text-gray-800">

<header class="bg-red-600 text-white shadow-md">
  <div class="container mx-auto flex justify-between items-center p-6">
    <h1 class="text-2xl font-bold">Emergency Planner</h1>
  </div>
</header>

<main class="container mx-auto p-8">

  <!-- City search + map -->
  <section class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
    <h3 class="text-2xl font-bold mb-4">Find a Safe Spot by City</h3>
    
    <input type="text" id="cityInput" placeholder="Type a city" class="w-full p-2 border rounded mb-2" autocomplete="off">
    <ul id="suggestions" class="bg-white border rounded max-h-48 overflow-y-auto mb-2"></ul>
    <div id="map" style="height: 400px;"></div>
  </section>

  <!-- Emergency info section -->
  <section class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow mt-8">
    <h3 class="text-2xl font-bold mb-4">Emergency Info</h3>
    <div id="cityInfo" class="text-gray-700 mb-4">
      <p>Type a city above to see its emergency information and safe spot.</p>
    </div>
    <div class="mb-2">
  <label for="disasterSelect" class="font-semibold">Select Disaster:</label>
  <select id="disasterSelect" class="w-full p-2 border rounded">
    <option value="">-- Choose Disaster --</option>
    <option value="Earthquake">Earthquake</option>
    <option value="Flood">Flood</option>
    <option value="Fire">Fire</option>
    <option value="Storm">Storm</option>
    <option value="General">General Emergency</option>
  </select>
</div>
  </section>

  

</main>

<footer class="bg-gray-200 text-center p-6 mt-12">
  &copy; 2026 Emergency Preparedness Hub
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Planner JS -->
<script src="js/planner.js"></script>

</body>
</html>
