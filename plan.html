<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emergency Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-o0sHk6DkzLJvPi1hA6RHa0hQ8IDh0kzxY+g2bK7r3xo=" crossorigin=""/>
</head>
<body class="bg-gray-50 text-gray-800">

<header class="bg-red-600 text-white shadow-md">
  <div class="container mx-auto flex justify-between items-center p-6">
    <h1 class="text-2xl font-bold">Emergency Planner</h1>
    <nav class="space-x-4">
      <a href="index.html" class="hover:text-gray-200">Home</a>
      <a href="plan.html" class="hover:text-gray-200">Planner</a>
      <a href="resources.html" class="hover:text-gray-200">Resources</a>
      <a href="about.html" class="hover:text-gray-200">About</a>
    </nav>
  </div>
</header>

<main class="container mx-auto p-8">
  <h2 class="text-3xl font-bold mb-4 text-center">Your Emergency Plan</h2>

  <!-- Planner Input -->
  <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow mb-10">
    <label class="block mb-2 font-bold">Household Members:</label>
    <input type="text" id="membersInput" placeholder="Enter names separated by commas" class="w-full p-2 border rounded mb-4">

    <label class="block mb-2 font-bold">Emergency Supplies:</label>
    <input type="text" id="suppliesInput" placeholder="Enter supplies separated by commas" class="w-full p-2 border rounded mb-4">

    <button onclick="savePlan()" class="w-full bg-red-500 text-white py-2 rounded hover:bg-red-600">Save Plan</button>

    <h3 class="text-xl font-bold mt-6">Saved Plan:</h3>
    <div id="planDisplay" class="mt-2 text-gray-700"></div>
  </div>

  <!-- Free city search + map -->
  <section class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
    <h3 class="text-2xl font-bold mb-4">Find a Safe Spot by City</h3>

    <input type="text" id="cityInput" placeholder="Type a city" class="w-full p-2 border rounded mb-4" oninput="showCitySuggestions()" autocomplete="off">
    <ul id="suggestions" class="bg-white border rounded max-h-48 overflow-y-auto mb-2"></ul>

    <div id="map" style="height: 400px;"></div>
  </section>
</main>

<footer class="bg-gray-200 text-center p-6 mt-12">
  &copy; 2026 Emergency Preparedness Hub
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-oP6HI9z1+ps5Fl2Z7sh2T+4UjF87Qfp3+TPi0vWg5Mo=" crossorigin=""></script>

<!-- Planner JS -->
<script src="js/planner.js"></script>

</body>
</html>
