<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Healthy Habit Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f4f8;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background: #4caf50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      cursor: pointer;
      background: #4caf50;
      color: white;
      border: none;
    }
    button:hover {
      background: #45a049;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #e0f2f1;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .completed {
      text-decoration: line-through;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>Healthy Habit Tracker</h1>
  <p>Build good habits, one day at a time!</p>
</header>

<main>
  <h2>Add a new habit</h2>
  <input type="text" id="habitInput" placeholder="Enter a habit (e.g., Drink water)">
  <button onclick="addHabit()">Add Habit</button>

  <h2>My Habits</h2>
  <ul id="habitList"></ul>
</main>

<script>
  // Load habits from localStorage
  let habits = JSON.parse(localStorage.getItem('habits')) || [];

  function saveHabits() {
    localStorage.setItem('habits', JSON.stringify(habits));
  }

  function renderHabits() {
    const list = document.getElementById('habitList');
    list.innerHTML = '';
    habits.forEach((habit, index) => {
      const li = document.createElement('li');
      li.className = habit.completed ? 'completed' : '';
      li.innerHTML = `
        ${habit.name} 
        <span>
          <button onclick="toggleComplete(${index})">✔️</button>
          <button onclick="deleteHabit(${index})">🗑️</button>
        </span>
      `;
      list.appendChild(li);
    });
  }

  function addHabit() {
    const input = document.getElementById('habitInput');
    const name = input.value.trim();
    if (name === '') return alert('Enter a habit!');
    habits.push({ name, completed: false });
    input.value = '';
    saveHabits();
    renderHabits();
  }

  function toggleComplete(index) {
    habits[index].completed = !habits[index].completed;
    saveHabits();
    renderHabits();
  }

  function deleteHabit(index) {
    if(confirm('Delete this habit?')) {
      habits.splice(index, 1);
      saveHabits();
      renderHabits();
    }
  }

  // Initial render
  renderHabits();
</script>

</body>
</html>
